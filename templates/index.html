<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerdada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f0e8;
            font-family: Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.8rem;
            color: #222;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        #strippi-alue {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 1px;
            background-color: #ffffff;
            padding: 15px;
            margin-bottom: 35px;
            min-height: 120px;
        }

        #strippi-alue img {
            display: block;
            height: 220px;
            width: auto;
            object-fit: contain;
            padding: 7px;
            background-color: #ffffff;
        }

        #lataus-teksti {
            color: #888;
            font-style: italic;
            font-size: 1rem;
            align-self: center;
            padding: 40px;
        }

        #arvo-nappi {
            background-color: #222;
            color: #f5f0e8;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-family: Georgia, serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 2px;
        }

        #arvo-nappi:hover {
            background-color: #444;
        }

        #arvo-nappi:active {
            background-color: #000;
        }

        #arvo-nappi:disabled {
            background-color: #aaa;
            cursor: default;
        }

        #virhe-teksti {
            color: #c00;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        #kuvaus {
            margin-top: 12px;
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            font-style: italic;
        }

        footer a {
            color: #aaa;
            text-decoration: none;
        }

        footer a:hover {
            color: #666;
        }

        footer {
            margin-top: 40px;
            color: #aaa;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Fingerdada</h1>

    <div id="strippi-alue">
        <span id="lataus-teksti">Paina nappia niin arvotaan strippi!</span>
    </div>

    <button id="arvo-nappi" onclick="arvoStrippi()">Arvo uusi strippi</button>
    <p id="virhe-teksti">Jotain meni pieleen, yritä uudelleen.</p>
    <p id="kuvaus">Sovellus arpoo vuoden 2024 Fingerpori-strippien ruuduista<br>uuden kolmiruutuisen Fingerdada-stripin.</p>

    <footer>Fingerpori © Pertti Jarla – Fingerdada on <a href="mailto:viuhtilisko@gmail.com">faniteos</a></footer>

    <script>
        async function arvoStrippi() {
            const nappi = document.getElementById('arvo-nappi');
            const alue = document.getElementById('strippi-alue');
            const virhe = document.getElementById('virhe-teksti');

            nappi.disabled = true;
            nappi.textContent = 'Arvotaan...';
            virhe.style.display = 'none';
            alue.innerHTML = '<span id="lataus-teksti">Ladataan...</span>';

            try {
                const vastaus = await fetch('/arvo');
                if (!vastaus.ok) throw new Error('Verkkovirhe');
                const data = await vastaus.json();

                if (data.virhe) throw new Error(data.virhe);

                // Ladataan kuvat ja näytetään ne kun kaikki ovat valmiita
                const kuvat = await Promise.all(data.paneelit.map(nimi => {
                    return new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = '/paneelit/' + encodeURIComponent(nimi);
                    });
                }));

                alue.innerHTML = '';
                kuvat.forEach(img => alue.appendChild(img));

            } catch (e) {
                alue.innerHTML = '<span id="lataus-teksti">Paina nappia niin arvotaan strippi!</span>';
                virhe.style.display = 'block';
            } finally {
                nappi.disabled = false;
                nappi.textContent = 'Arvo uusi strippi';
            }
        }
    </script>

</body>
</html>
